name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - v*
  pull_request:
    branches:
      - master

jobs:

  build-and-push-docker-images:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            gpu: cuda
          - os: ubuntu-22.04
            gpu: rocm
          - os: ubuntu-22.04-arm
            gpu: cudaarm
            suffix: -arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show disk and docker usage (before cleanup)
        run: |
          df -h
          echo " -= Docker System =-"
          docker system df || true

      - name: Free disk space (cleanup heavy preinstalled directories + docker prune)
        run: |
          echo " -= Removing big preinstalled directories (shouldn't remove the needed tools) =-"
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/lib/jvm || true
          sudo rm -rf /usr/local/lib/android || true
          echo " -= Running docker prune =-"
          docker system prune -af --volumes || true
          docker builder prune -af || true

      - name: Show disk and docker usage (after cleanup)
        run: |
          df -h
          echo " -= Docker System =-"
          docker system df || true

      - name: Build Docker images
        run: |
          ./docker/build_all.sh latest 0 ${{ matrix.gpu }} ${{ matrix.suffix }}

      - name: Login to DockerHub
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        run: |
          ./docker/build_all.sh ${GITHUB_REF##*/v} 1 ${{ matrix.gpu }} ${{ matrix.suffix }}
